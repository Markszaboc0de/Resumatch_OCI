<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumatch - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .btn-xl {
            padding: 1.5rem 2.5rem;
            font-size: 1.5rem;
            margin: 1rem;
        }
    </style>
</head>

<body>
    <!-- Language Switcher -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 1050; display: flex; gap: 5px; background: rgba(255,255,255,0.9); padding: 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;">
        <a href="{{ url_for('set_language', lang='en') }}" class="btn btn-sm {% if session.get('lang', 'en') == 'en' %}btn-primary{% else %}btn-outline-primary{% endif %}" style="font-size: 0.8rem; padding: 2px 8px; font-weight: bold;">EN</a>
        <a href="{{ url_for('set_language', lang='hu') }}" class="btn btn-sm {% if session.get('lang') == 'hu' %}btn-primary{% else %}btn-outline-primary{% endif %}" style="font-size: 0.8rem; padding: 2px 8px; font-weight: bold;">HU</a>
    </div>


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('landing') }}">Resumatch</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('listings') }}">Database Listing</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container hero-section text-center">
        <div>
            <h1 class="display-4 mb-5">Welcome to Resumatch</h1>
            <div class="d-flex justify-content-center flex-wrap">
                <a href="{{ url_for('employer') }}" class="btn btn-primary btn-xl">I am an Employer</a>
                <a href="{{ url_for('job_seeker') }}" class="btn btn-success btn-xl">I am Looking for a Job</a>
            </div>
            <div class="mt-5">
                <a href="{{ url_for('listings') }}" class="btn btn-outline-secondary">View All Listings</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
